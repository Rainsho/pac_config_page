server {
    listen 80;

    root /home/maru/apps/pac/next/public;
    access_log /home/maru/logs/nginx_access_log;
    error_log  /home/maru/logs/nginx_error_log;

    client_max_body_size 2000M;

    # Next.js static assets (hashed, long cache)
    location /_next/ {
        alias /home/maru/apps/pac/next/.next/standalone/.next/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Public static files
    location /favicon.ico {
        alias /home/maru/apps/pac/next/public/favicon.ico;
    }

    # NAS file serving (direct file access for video playback)
    location ~ ^/nas/ {
        root /home/maru;
    }

    # Droppy / Aria2 / Xunlei iframe proxies
    location /droppy/ {
        proxy_pass http://127.0.0.1:8989/;
    }

    location /aria2/ {
        proxy_pass http://127.0.0.1:6800/;
    }

    location /xunlei/ {
        proxy_pass http://127.0.0.1:2345/;
    }

    # Proxy all other requests to Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }
}
